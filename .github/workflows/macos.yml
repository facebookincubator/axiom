name: macOS Build
on:
  push:
    branches:
      - main
    paths:
      - axiom/**
      - velox
      - CMakeLists.txt
      - .github/workflows/macos.yml
      - Makefile
  pull_request:
    paths:
      - axiom/**
      - velox
      - CMakeLists.txt
      - .github/workflows/macos.yml
      - Makefile
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true
jobs:
  macos-build:
    name: macOS ${{ matrix.build_type }}
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
    runs-on: macos-15
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
      INSTALL_PREFIX: /tmp/deps-install
      BUILD_TYPE: ${{ matrix.build_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Dependencies
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 'TRUE'
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: |
          source velox/scripts/setup-macos.sh
          # Match the SHARED build axiom configures with below. Without
          # this, install_folly's conditional adds -DGFLAGS_SHARED=FALSE
          # which statically embeds gflags into libfolly.a. Axiom then
          # also links libgflags.dylib via libvelox.so, putting two
          # copies of gflags in each test binary, which gflags detects
          # at runtime: "ERROR: something wrong with flag 'flagfile'
          # … linked both statically and dynamically".
          export VELOX_BUILD_SHARED=ON
          # Keep the NDEBUG state of every installed dep in lockstep
          # with axiom's own build. cmake_install_dir doesn't pass
          # CMAKE_BUILD_TYPE, so without this folly/fizz/wangle/etc.
          # default to no-build-type (no -DNDEBUG, no -O). Axiom's
          # release build defines NDEBUG → folly's F14 templates have
          # different struct layouts between the prebuilt libfolly.dylib
          # (no NDEBUG) and axiom's inline expansions (NDEBUG), which
          # fires F14's chunk-tag audit at line 2380 of F14Table.h in
          # rehashImpl. Debug builds match folly's default and pass;
          # release builds need this. Modern cmake (>=3.22) reads the
          # CMAKE_BUILD_TYPE env var when no -D override is passed.
          if [ "$BUILD_TYPE" = "release" ]; then
            export CMAKE_BUILD_TYPE=Release
          else
            export CMAKE_BUILD_TYPE=Debug
          fi
          install_build_prerequisites
          install_velox_deps_from_brew
          install_gflags
          install_glog
          install_double_conversion
          # FBThrift dep chain — required by velox/CMakeLists.txt's
          # find_package(fizz | wangle | FBThrift CONFIG REQUIRED)
          # block (introduced by velox#16019), hit whenever
          # VELOX_ENABLE_PARQUET is on (always, for axiom). Each
          # install builds against the previous, so order matters:
          #   boost/fmt/ranges_v3 — folly's build deps
          #   folly — fizz/wangle/mvfst/fbthrift's runtime dep
          #   fizz/wangle/mvfst — fbthrift's runtime deps
          # We do NOT call install_velox_deps wholesale: it pulls in
          # install_arrow, which axiom doesn't install today (velox
          # bundles arrow itself via VELOX_DEPENDENCY_SOURCE=AUTO)
          # and arrow's macOS build has its own Boost::process issue.
          install_ranges_v3
          install_boost
          install_fmt
          install_folly
          install_fizz
          install_wangle
          install_mvfst
          install_fbthrift

          echo "NJOBS=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV
          echo "$INSTALL_PREFIX/bin" >> $GITHUB_PATH

      - name: Restore Ccache
        uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ matrix.build_type }}
      - name: Ccache Restore Status
        run: echo "Restored ccache $(du -sh $CCACHE_DIR 2>/dev/null | cut -f1 || echo empty)"

      - name: Configure Build
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
          # Use the fmt we installed in setup (11.2.0) instead of having
          # velox FetchContent fmt 9.0.0. With BUNDLED, the bundled fmt's
          # add_library(fmt::fmt ALIAS …) collides with the fmt::fmt
          # target that folly-config.cmake already pulls in when
          # find_package(folly) loads our SYSTEM folly.
          fmt_SOURCE: SYSTEM
        run: |
          # CXX flags must match what velox's get_cxx_flags applied
          # when building libfolly.dylib (which it always does on
          # apple-m1+crc). Without these, axiom's release build
          # inlines folly F14 templates with __ARM_FEATURE_CRC32
          # undefined, taking the non-CRC hash path. libfolly's
          # already-compiled code took the CRC path. The tag stored
          # at insertion (CRC) and the tag recomputed at rehash
          # (non-CRC, inlined into axiom) disagree, firing
          # FOLLY_SAFE_CHECK at F14Table.h:2381 in rehashImpl.
          # Debug doesn't inline so it goes through libfolly's
          # CRC path consistently and passes; release inlines and
          # mismatches.
          EXTRA_CMAKE_CXX_FLAGS="-mcpu=apple-m1+crc"
          if [ "$BUILD_TYPE" = "release" ]; then
            ccache -sz -M 1Gi
          else
            ccache -sz -M 5Gi
          fi
          echo "--- ccache status before build ---"
          echo "Cache size: $(du -sh $CCACHE_DIR 2>/dev/null | cut -f1 || echo 'empty')"
          echo "Max size: $(ccache -p | grep max_size | awk '{print $4}')"
          cmake \
              -B _build/$BUILD_TYPE \
              -GNinja \
              -DCMAKE_CXX_FLAGS="$EXTRA_CMAKE_CXX_FLAGS" \
              -DCMAKE_PREFIX_PATH="$INSTALL_PREFIX;$(brew --prefix icu4c)" \
              -DVELOX_ENABLE_PARQUET=ON \
              -DVELOX_MONO_LIBRARY=ON \
              -DVELOX_BUILD_SHARED=ON \
              -DVELOX_BUILD_TESTING=OFF \
              -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
              -DAXIOM_BUILD_TESTING=ON

      - name: Build
        run: |
          cmake --build _build/$BUILD_TYPE -j $NJOBS

      - name: CCache Statistics After Build
        if: always()
        run: |
          echo "--- ccache summary ---"
          ccache -s | grep -E "Hits|Misses|size|evicted"
          echo "Cache dir size: $(du -sh $CCACHE_DIR 2>/dev/null | cut -f1)"
          echo ""
          echo "--- ccache full stats ---"
          ccache -vs
          echo ""
          echo "--- evicting stale entries ---"
          ccache --evict-older-than 1d
          echo "Cache dir size after eviction: $(du -sh $CCACHE_DIR 2>/dev/null | cut -f1)"

      - name: Save Ccache
        uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ matrix.build_type }}

      - name: F14 Diagnostic - Symbol and Library Analysis
        if: matrix.build_type == 'release'
        run: |
          BIN=_build/$BUILD_TYPE/axiom/optimizer/tests/axiom_optimizer_tests
          if [ ! -x "$BIN" ]; then
            echo "Test binary not found at $BIN — listing candidates:"
            find _build/$BUILD_TYPE -name "axiom_optimizer_tests*" -type f | head -5
            exit 0
          fi

          echo "=== otool -L (dynamic library deps for libc++/folly/velox) ==="
          otool -L "$BIN" | grep -iE "libc\+\+|libfolly|libvelox|libsystem" || true

          echo ""
          echo "=== nm: __hash_memory symbol presence (T=defined U=undefined-from-dylib) ==="
          nm "$BIN" | grep -i hash_memory || echo "no __hash_memory symbol (fully inlined per TU)"

          echo ""
          echo "=== nm: __murmur2_or_cityhash symbol presence ==="
          nm "$BIN" | grep -i "murmur2_or_cityhash" || echo "no cityhash symbol (fully inlined per TU)"

          echo ""
          echo "=== nm: std::hash<...Repartition...> instantiations (demangled) ==="
          nm "$BIN" | xcrun c++filt 2>/dev/null | grep -E "std::__1::hash.*Repartition|std::hash.*Repartition" | head -20 || echo "no std::hash<Repartition*> symbol (fully inlined)"

          echo ""
          echo "=== nm: F14DiagSelfTest constructor symbols (one per TU) ==="
          nm "$BIN" | xcrun c++filt 2>/dev/null | grep -E "F14DiagSelfTest" | head -10 || true

          echo ""
          echo "=== otool -tV: disassembly of commitGroupedLeavesForRepartition (INSERT site, includes inlined std::hash) ==="
          ADDR_INSERT=$(nm "$BIN" | grep "commitGroupedLeavesForRepartition" | awk '{print $1}' | head -1)
          if [ -n "$ADDR_INSERT" ]; then
            echo "symbol at address: 0x$ADDR_INSERT"
            otool -tV "$BIN" 2>&1 | awk '/commitGroupedLeavesForRepartition.*:$/{p=1; n=0} p && /^[0-9a-fA-F_].*:$/ && !/commitGroupedLeavesForRepartition/{p=0} p && (++n <= 400)'
          else
            echo "commitGroupedLeavesForRepartition symbol not found (may be inlined into all callers)"
          fi

          echo ""
          echo "=== otool -tV: disassembly of ToVelox::makeRepartition (FIND site, includes inlined std::hash) ==="
          ADDR_FIND=$(nm "$BIN" | xcrun c++filt 2>/dev/null | grep -E "ToVelox::makeRepartition" | awk '{print $1}' | head -1)
          if [ -n "$ADDR_FIND" ]; then
            echo "symbol matched (demangled). Searching disassembly:"
            otool -tV "$BIN" 2>&1 | awk '/ToVelox.*makeRepartition.*:$/{p=1; n=0} p && /^[0-9a-fA-F_].*:$/ && !/makeRepartition/{p=0} p && (++n <= 400)'
          else
            echo "ToVelox::makeRepartition symbol not found"
          fi

      - name: Run Tests
        run: |
          ctest --test-dir _build/$BUILD_TYPE -j $NJOBS --output-on-failure --no-tests=error
